<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парковая беседка</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">
        <a href="index.html" class="header__logo">
            Парковая беседка
        </a>
        <nav aria-label="main" class="header__menu">
            <a href="registration.html" class="header__link header__link_active">
                Зарегистрироваться
            </a>
            <a href="login.html" class="header__link">
                Войти
            </a>
        </nav>
    </header>

    <main class="main">

        <h1 class="main__title">
            Регистрация
        </h1>

        <form action="login.html" class="form" method="post">

            <!-- label + input + error-->
            <div class="form__row">
                <label for="login" class="form__label">Логин</label>
                <input type="text" name="login" id="login" class="form__input" minlength="5" required>
                <div class="form__error" hidden>Введите логин</div>
            </div>

            <!-- label + input + error-->
            <div class="form__row">
                <label for="password" class="form__label">Пароль</label>
                <input type="password" name="password" id="password" class="form__input" minlength="6" required
                    autocomplete="on">
                <div class="form__error" hidden>Введите пароль</div>
            </div>

            <!-- label + input + error-->
            <div class="form__row">
                <label for="name" class="form__label">Имя</label>
                <input type="text" name="name" id="name" class="form__input" required>
                <div class="form__error" hidden>Введите имя</div>
            </div>

            <!-- label + input + error-->
            <div class="form__row">
                <label for="surname" class="form__label">Фамилия</label>
                <input type="text" name="surname" id="surname" class="form__input" required>
                <div class="form__error" hidden>Введите фамилию</div>
            </div>

            <!-- label + input + error-->
            <div class="form__row">
                <label for="phone" class="form__label">Телефон</label>
                <input type="tel" name="phone" id="phone" class="form__input" required>
                <div class="form__error" hidden>Введите телефон</div>
            </div>

            <!-- label + input + error-->
            <div class="form__row">
                <label for="email" class="form__label">Адрес электронной почты</label>
                <input type="email" name="email" id="email" class="form__input" required>
                <div class="form__error" hidden>Введите адрес эллектронной почты</div>
            </div>

            <button type="submit" class="form__button">Зарегистрироваться</button>
        </form>

    </main>

</body>

</html>
